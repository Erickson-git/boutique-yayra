<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>YAYRA Nail Shop — Live & Vidéos</title>
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/favicon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <!-- Accélère le chargement des vidéos et miniatures YouTube -->
  <link rel="preconnect" href="https://www.youtube.com" />
  <link rel="preconnect" href="https://i.ytimg.com" crossorigin />
  <link rel="preconnect" href="https://i9.ytimg.com" crossorigin />
  <link rel="dns-prefetch" href="https://googlevideo.com" />
  <link rel="dns-prefetch" href="https://www.google.com" />
</head>
<body class="live-body">
  <div class="lv-stage">
    <div class="lv-top" id="lvTop">
      <a href="index.html" class="lv-close" aria-label="Accueil"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M15 6l-6 6 6 6"/></svg></a>
      <span id="lvTitle" style="color:#fff; font-family:var(--serif); letter-spacing:.1em; font-size:15px;">Vidéos</span>
      <span class="lv-count" id="lvLiveInfo" style="display:none;"><span class="lv-live" style="padding:4px 8px;">EN DIRECT</span> <span id="lvCount">0</span></span>
    </div>

    <video id="remoteVideo" class="lv-video" autoplay playsinline style="display:none;"></video>
    <div class="hearts-live" id="hearts"></div>
    <div class="lv-chat" id="lvChat" style="display:none;"></div>

    <div class="lv-actions" id="lvActions" style="display:none;">
      <button class="lv-abtn" id="likeBtn"><span class="fa-ic"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 20s-7-4.6-9.3-8.5C1.2 8.6 2.6 5 6.2 5c2 0 3.2 1.2 3.8 2.2C10.6 6.2 11.8 5 13.8 5c3.6 0 5 3.6 3.5 6.5C19 15.4 12 20 12 20Z"/></svg></span><span id="likeCount">0</span></button>
      <button class="lv-abtn" id="muteBtn"><span class="fa-ic"><svg class="ic" id="muteIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M22 9l-6 6M16 9l6 6"/></svg></span><span id="muteLbl">Son</span></button>
      <button class="lv-abtn" id="joinBtn"><span class="fa-ic"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M16 11a4 4 0 1 0-4-4M3 21a7 7 0 0 1 11-5.7"/><path d="M19 14v6M16 17h6"/></svg></span><span id="joinLbl">Rejoindre</span></button>
      <button class="lv-abtn" id="shareBtn"><span class="fa-ic"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M16 6l-4-4-4 4"/><path d="M12 2v13"/></svg></span>Partager</button>
      <a class="lv-abtn" href="shop.html"><span class="fa-ic"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 8h12l1 12H5L6 8Z"/><path d="M9 8a3 3 0 0 1 6 0"/></svg></span>Boutique</a>
    </div>

    <div class="lv-reactions" id="lvReactions" style="display:none;">
      <button type="button" data-emoji="❤️" aria-label="Cœur">❤️</button>
      <button type="button" data-emoji="🔥" aria-label="Feu">🔥</button>
      <button type="button" data-emoji="😍" aria-label="Adoration">😍</button>
      <button type="button" data-emoji="👏" aria-label="Applaudir">👏</button>
      <button type="button" data-emoji="😮" aria-label="Waouh">😮</button>
      <button type="button" data-emoji="🎉" aria-label="Fête">🎉</button>
      <button type="button" data-emoji="✨" aria-label="Étincelles">✨</button>
    </div>

    <form class="lv-compose" id="lvCompose" style="display:none;">
      <input id="lvInput" placeholder="Écrire un commentaire…" maxlength="160" autocomplete="off" />
      <button type="submit">Envoyer</button>
    </form>

    <div class="lv-overlaybtn" id="lvUnmute" style="display:none;">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M16 9a4 4 0 0 1 0 6"/></svg>
      <div>Toucher pour activer le son</div>
    </div>

    <div class="feed" id="lvFeed" style="display:none;"></div>

    <div class="lv-empty" id="lvEmpty" style="display:none;">
      <p class="section-eyebrow">YAYRA Nail Shop</p>
      <h2>Bientôt en vidéo</h2>
      <p>Aucune vidéo pour le moment. Reviens vite !</p>
      <a class="btn-gold" href="shop.html">Voir la boutique</a>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/live-core.js"></script>
  <script src="assets/js/videos.js"></script>
  <script src="assets/js/live.js"></script>
  <script src="assets/js/sw-register.js"></script>
</body>
</html>
