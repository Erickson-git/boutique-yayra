<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAYRA Nail Shop — Mes commandes</title>
  <meta name="theme-color" content="#1c140b">
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../assets/favicon.svg" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-logo"><a href="../index.html"><span class="logo-y">Y</span>AYRA <span class="logo-sub">Nail Shop</span></a></div>
    <ul class="nav-links">
      <li><a href="../shop.html">Boutique</a></li>
      <li><a href="dashboard.html">Mon espace</a></li>
      <li><a href="appointments.html">Rendez-vous</a></li>
      <li><a href="orders.html" class="active">Commandes</a></li>
    </ul>
    <div class="nav-actions">
      <button class="btn-outline" type="button" id="logoutBtn">Se déconnecter</button>
    </div>
    <button class="menu-toggle" id="menuToggle" aria-label="Menu"><svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
  </nav>

  <header class="page-hero">
    <div class="ph-media" style="background-image:url('../assets/images/net-serums-luxe.jpg')"></div>
    <div class="container">
      <p class="section-eyebrow">Mon espace</p>
      <h1>Mes commandes</h1>
      <p>L'historique de vos achats et leur statut de livraison.</p>
    </div>
  </header>

  <section class="page">
    <div class="container" style="max-width:980px;">
      <div class="product-card" style="grid-column:span 12;">
        <div class="product-info">
          <div id="ordersWrap"></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="slim-footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2026 YAYRA Nail Shop — Lomé, Togo</p>
        <div class="footer-legal"><a href="../index.html">Accueil</a><a href="../shop.html">Boutique</a></div>
      </div>
    </div>
  </footer>

  <a href="https://wa.me/22897498685?text=Bonjour+YAYRA+!" class="whatsapp-float" target="_blank" rel="noopener" aria-label="WhatsApp">
    <svg class="ic" viewBox="0 0 24 24"><path d="M20.5 11.5a8.5 8.5 0 0 1-12.7 7.4L3.5 20l1.1-4.2a8.5 8.5 0 1 1 15.9-4.3Z"/><path d="M8.5 8.8c0 4 2.7 6.7 6.7 6.7"/></svg>
    <span class="wa-tooltip">Commander sur WhatsApp</span>
  </a>

  <script src="../assets/js/main.js"></script>
  <script>
    const token = () => localStorage.getItem('yayra_token') || '';
    function clientSession(){ try{ return JSON.parse(localStorage.getItem('yayra_client_session') || 'null'); }catch(e){ return null; } }
    const goLogin = () => { window.location.href = 'login.html'; };
    document.getElementById('logoutBtn').addEventListener('click', ()=>{ localStorage.removeItem('yayra_token'); goLogin(); });
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=> ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    async function loadOrders(){
      const wrap = document.getElementById('ordersWrap');
      if(!token()){ goLogin(); return; }
      if(!window.YAYRA_ORDERS){ wrap.innerHTML = '<p class="muted">Chargement…</p>'; return; }
      const O = window.YAYRA_ORDERS;
      const s = clientSession();
      wrap.innerHTML = '<p class="muted">Chargement...</p>';
      const orders = (s && s.email) ? await O.listForClient(s.email) : [];
      if(!orders.length){ wrap.innerHTML = '<p class="muted">Vous n\'avez pas encore de commande. <a href="../shop.html" style="color:var(--gold)">Découvrir la boutique</a></p>'; return; }
      wrap.innerHTML = orders.map(function(o){
        const paid = o.status === 'paid';
        const disc = (o.discount_fcfa||0) > 0;
        const eff = O.effectiveTotal(o);
        const badge = paid
          ? '<span class="order-stamp" style="font-size:13px;">Payé</span>'
          : '<span style="background:var(--gold);color:#1a1206;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:600;">En attente de paiement</span>';
        const items = (o.items||[]).map(function(it){ return esc(it.name)+' ×'+(it.qty||1); }).join(', ');
        const notice = disc
          ? '<div style="margin:10px 0;padding:11px 14px;border:1px solid var(--gold-2);border-radius:12px;background:var(--bg-2);color:var(--gold);font-weight:600;font-size:14px;">🎉 Réduction de '+O.fcfa(o.discount_fcfa)+' appliquée par la boutique !'+(o.discountStr?(' <span class="muted" style="font-weight:400;">('+esc(o.discountStr)+')</span>'):'')+'</div>'
          : '';
        const totalHtml = disc
          ? 'Total : <span class="muted" style="text-decoration:line-through;font-weight:400;font-size:13px;">'+O.fcfa(o.total_fcfa)+'</span> <span style="color:var(--gold);">'+O.fcfa(eff)+'</span>'
          : 'Total : <span style="color:var(--gold);">'+O.fcfa(o.total_fcfa)+'</span>';
        return '<div style="border:1px solid var(--line-2);border-radius:var(--r-md);padding:18px;margin-bottom:14px;background:var(--paper);">'
          + '<div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center;"><strong>'+esc(o.ref||o.id)+'</strong>'+badge+'</div>'
          + '<p class="muted" style="margin:8px 0 4px;font-size:13px;">🗓 Commandé le '+esc(o.createdStr||'')+(paid&&o.paidStr?(' · payé le '+esc(o.paidStr)):'')+'</p>'
          + notice
          + '<p style="margin:4px 0;">'+items+'</p>'
          + '<strong>'+totalHtml+'</strong>'
          + '</div>';
      }).join('');
    }
    document.addEventListener('DOMContentLoaded', loadOrders);
    setInterval(loadOrders, 25000); // met à jour le statut (ex. paiement confirmé)
  </script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/orders.js"></script>
  <script src="../assets/js/livebadge.js"></script>
  <script src="../assets/js/xofix.js"></script>
  <script src="../assets/js/account.js"></script>
  <script src="../assets/js/chat.js"></script>
  <script src="../assets/js/sw-register.js"></script>
</body>
</html>
