<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAYRA — Mes rendez-vous</title>
  <meta name="theme-color" content="#1c140b">
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-logo"><a href="../index.html"><span class="logo-y">Y</span>AYRA <span class="logo-sub">Nail Shop</span></a></div>
    <ul class="nav-links">
      <li><a href="../shop.html">Boutique</a></li>
      <li><a href="dashboard.html">Mon espace</a></li>
      <li><a href="appointments.html" class="active">Rendez-vous</a></li>
      <li><a href="orders.html">Commandes</a></li>
    </ul>
    <div class="nav-actions">
      <button class="btn-outline" type="button" id="logoutBtn">Se déconnecter</button>
    </div>
    <button class="menu-toggle" id="menuToggle" aria-label="Menu"><svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
  </nav>

  <header class="page-hero">
    <div class="ph-media" style="background-image:url('../assets/images/net-nailart-amber.jpg')"></div>
    <div class="container">
      <p class="section-eyebrow">Mon espace</p>
      <h1>Mes rendez-vous</h1>
      <p>Réservez votre service beauté et consultez votre historique.</p>
    </div>
  </header>

  <section class="page">
    <div class="container" style="max-width:980px;">
      <div class="products-grid" style="grid-template-columns:1fr;">
        <div class="product-card" style="grid-column:span 12;">
          <div class="product-info">
            <h4 style="font-size:22px;">Réserver un créneau</h4>
            <form id="apptForm" class="form" style="max-width:560px;">
              <input name="full_name" placeholder="Nom complet" required />
              <input name="phone" placeholder="Téléphone" required />
              <select name="service" required>
                <option value="Nail Art">Onglerie / Nail Art</option>
                <option value="Soins Visage">Soins du visage</option>
                <option value="Capillaire">Soins capillaires</option>
                <option value="Maquillage">Maquillage</option>
              </select>
              <input name="appointment_time" type="datetime-local" required />
              <textarea name="notes" placeholder="Notes (optionnel)" rows="4"></textarea>
              <p class="muted" id="apptMsg" aria-live="polite" style="margin:0;"></p>
              <button class="btn-gold" type="submit">Confirmer le rendez-vous</button>
            </form>
          </div>
        </div>
        <div class="product-card" style="grid-column:span 12;">
          <div class="product-info">
            <h4 style="font-size:22px;">Historique</h4>
            <div id="apptWrap"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="slim-footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2026 YAYRA — Lomé, Togo</p>
        <div class="footer-legal"><a href="../index.html">Accueil</a><a href="../shop.html">Boutique</a></div>
      </div>
    </div>
  </footer>

  <a href="https://wa.me/22897498685?text=Bonjour+YAYRA+!" class="whatsapp-float" target="_blank" rel="noopener" aria-label="WhatsApp">
    <svg class="ic" viewBox="0 0 24 24"><path d="M20.5 11.5a8.5 8.5 0 0 1-12.7 7.4L3.5 20l1.1-4.2a8.5 8.5 0 1 1 15.9-4.3Z"/><path d="M8.5 8.8c0 4 2.7 6.7 6.7 6.7"/></svg>
    <span class="wa-tooltip">Commander sur WhatsApp</span>
  </a>

  <script src="../assets/js/main.js"></script>
  <script>
    const token = () => localStorage.getItem('yayra_token') || '';
    const goLogin = () => { window.location.href = 'login.html'; };
    document.getElementById('logoutBtn').addEventListener('click', ()=>{ localStorage.removeItem('yayra_token'); goLogin(); });

    async function listAppointments(){
      const wrap = document.getElementById('apptWrap');
      const t = token();
      if(!t){ goLogin(); return; }
      wrap.innerHTML = '<p class="muted">Chargement...</p>';
      try{
        const res = await fetch('../api/appointments.php?action=list', { method: 'GET', headers: { 'Authorization': 'Bearer ' + t } });
        const data = await res.json();
        if(!data.ok){ wrap.innerHTML = '<p class="muted">Session expirée.</p>'; return; }
        const items = data.appointments || [];
        if(items.length === 0){ wrap.innerHTML = '<p class="muted">Aucun rendez-vous pour le moment.</p>'; return; }
        let html = '<div class="table-wrap"><table class="table"><thead><tr><th>N°</th><th>Service</th><th>Date</th><th>Statut</th></tr></thead><tbody>';
        for(const a of items){ html += `<tr><td>#${a.id}</td><td>${a.service}</td><td>${a.appointment_time}</td><td>${a.status}</td></tr>`; }
        html += '</tbody></table></div>';
        wrap.innerHTML = html;
      }catch(e){ wrap.innerHTML = '<p class="muted">Erreur réseau.</p>'; }
    }

    document.getElementById('apptForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const msg = document.getElementById('apptMsg');
      msg.textContent = '';
      const t = token();
      if(!t){ goLogin(); return; }
      const fd = new FormData(e.target);
      const body = {
        full_name: fd.get('full_name'), phone: fd.get('phone'), service: fd.get('service'),
        appointment_time: fd.get('appointment_time'), notes: fd.get('notes'),
      };
      try{
        const res = await fetch('../api/appointments.php?action=create', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + t },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if(!data.ok){ msg.textContent = data.error || 'Erreur lors de la création.'; return; }
        e.target.reset();
        msg.textContent = 'Rendez-vous créé.';
        await listAppointments();
      }catch(err){ msg.textContent = 'Erreur réseau.'; }
    });

    document.addEventListener('DOMContentLoaded', listAppointments);
  </script>
</body>
</html>
