<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAYRA — Connexion</title>
  <meta name="theme-color" content="#1c140b">
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-logo"><a href="../index.html"><span class="logo-y">Y</span>AYRA <span class="logo-sub">Nail Shop</span></a></div>
    <div class="nav-actions">
      <a href="../shop.html" class="btn-outline">Boutique</a>
      <a href="register.html" class="btn-gold">Créer un compte</a>
    </div>
  </nav>

  <div class="auth">
    <div class="auth-media">
      <div class="am-img" style="background-image:url('../assets/images/net-facial-spa.jpg')"></div>
      <div class="auth-quote">
        <p class="section-eyebrow">Maison de beauté · Lomé</p>
        <p>« La beauté commence au moment où vous décidez d'être vous-même. »</p>
      </div>
    </div>
    <div class="auth-form-wrap">
      <div class="auth-card">
        <p class="section-eyebrow">Mon compte</p>
        <h1 class="section-title">Bon retour</h1>
        <p class="muted">Connectez-vous pour suivre vos commandes et rendez-vous.</p>
        <form class="form" id="loginForm">
          <input name="email" type="email" placeholder="Adresse email" required />
          <input name="password" type="password" placeholder="Mot de passe" required />
          <p class="muted" id="loginMsg" aria-live="polite" style="margin:0;"></p>
          <button class="btn-gold" type="submit">Se connecter</button>
        </form>
        <p class="auth-alt">Pas encore de compte ? <a href="register.html">Créer un compte</a></p>
      </div>
    </div>
  </div>

  <footer class="slim-footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2026 YAYRA — Lomé, Togo</p>
        <div class="footer-legal"><a href="../index.html">Accueil</a><a href="../shop.html">Boutique</a></div>
      </div>
    </div>
  </footer>

  <script src="../assets/js/main.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('loginMsg');
    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      msg.textContent = '';
      const fd = new FormData(form);
      try{
        const res = await fetch('../api/auth.php?action=login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') }),
        });
        const data = await res.json();
        if(!data.ok){ msg.textContent = data.error || 'Identifiants incorrects.'; return; }
        localStorage.setItem('yayra_token', data.token);
        window.location.href = (data.role === 'admin') ? '../admin/admin-orders.html' : './dashboard.html';
      }catch(err){ msg.textContent = 'Erreur réseau.'; }
    });
  </script>
</body>
</html>
