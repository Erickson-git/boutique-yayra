<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAYRA — Réception commande</title>
  <meta name="theme-color" content="#1c140b">
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-logo"><a href="index.html"><span class="logo-y">Y</span>AYRA <span class="logo-sub">Réception</span></a></div>
    <div class="nav-actions">
      <a class="btn-outline" href="admin-orders.html">Toutes les commandes</a>
    </div>
  </nav>

  <section class="page">
    <div class="container" style="max-width:680px;">
      <div class="section-header">
        <p class="section-eyebrow">Boutique</p>
        <h2 class="section-title">Réception de la commande</h2>
      </div>
      <div id="result" class="product-card" style="grid-column:span 12;">
        <div class="product-info"><p class="muted">Enregistrement…</p></div>
      </div>
    </div>
  </section>

  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/orders.js"></script>
  <script>
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=> ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    (async function(){
      const O = window.YAYRA_ORDERS;
      const box = document.getElementById('result').querySelector('.product-info');
      const m = (location.hash || '').match(/[#&]i=([^&]+)/);
      if(!m){ box.innerHTML = '<p class="muted">Aucune commande à enregistrer dans ce lien.</p>'; return; }
      const order = O.decodeOrder(m[1]);
      if(!order){ box.innerHTML = '<p class="muted">Lien de commande invalide ou incomplet.</p>'; return; }
      await O.importOrder(order);

      const items = (order.items||[]).map(it=> '<tr><td style="font-weight:600;color:var(--ink);">'+esc(it.name)+'</td><td>×'+(it.qty||1)+'</td><td>'+O.fcfa((it.price_fcfa||0)*(it.qty||0))+'</td></tr>').join('');
      box.innerHTML =
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;"><span style="background:#1f7a3f;color:#fff;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;">✓ Commande enregistrée</span></div>'
        + '<div class="footer-logo" style="font-size:22px;margin:6px 0;"><span class="logo-y">Y</span>AYRA <span class="logo-sub">Nail Shop</span></div>'
        + '<p class="muted" style="margin:0;">Fiche '+esc(order.ref||order.id)+' · '+esc(order.createdStr||'')+'</p>'
        + '<div style="margin:12px 0;">'
        +   '<p style="margin:0;"><strong>'+esc(order.full_name||'—')+'</strong></p>'
        +   '<p class="muted" style="margin:2px 0 0;">📞 '+esc(order.phone||'—')+'</p>'
        +   '<p class="muted" style="margin:2px 0 0;">📍 '+esc(order.address||'(adresse non renseignée)')+'</p>'
        + '</div>'
        + '<div class="table-wrap"><table class="table"><tbody>'+items+'</tbody></table></div>'
        + '<p style="font-size:18px;margin:10px 0 16px;"><strong>Total : <span style="color:var(--gold);">'+O.fcfa(order.total_fcfa)+'</span></strong></p>'
        + '<div style="display:flex;gap:10px;flex-wrap:wrap;">'
        +   '<button class="btn-gold" id="invBtn" type="button">Facture proforma (WhatsApp)</button>'
        +   '<a class="btn-outline" href="admin-orders.html">Gérer / confirmer le paiement</a>'
        + '</div>'
        + '<p class="muted" style="font-size:12px;margin-top:12px;">Cette commande est maintenant dans « Commandes » (paiement, réduction, etc.).</p>';

      document.getElementById('invBtn').addEventListener('click', ()=>{
        if(!O.intlDigits(order.phone)){ alert('Numéro de la cliente manquant.'); return; }
        window.open(O.waInvoiceUrl(order), '_blank');
      });
    })();
  </script>
  <script src="../assets/js/sw-register.js"></script>
</body>
</html>
