<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAYRA Nail Shop — Admin · Produits</title>
  <meta name="theme-color" content="#1c140b">
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-logo"><a href="../index.html"><span class="logo-y">Y</span>AYRA <span class="logo-sub">Nail Shop</span></a></div>
    <ul class="nav-links">
      <li><a href="index.html">Tableau de bord</a></li>
      <li><a href="admin-products.html" class="active">Produits</a></li>
      <li><a href="admin-orders.html">Commandes</a></li>
      <li><a href="admin-kits.html">Kits</a></li>
      <li><a href="admin-videos.html">Vidéos</a></li>
      <li><a href="admin-contacts.html">Contacts</a></li>
      <li><a href="admin-appointments.html">Rendez-vous</a></li>
      <li><a href="admin-staff.html">Employés</a></li>
    </ul>
    <div class="nav-actions">
      <button class="btn-outline" type="button" id="logoutBtn">Se déconnecter</button>
    </div>
    <button class="menu-toggle" id="menuToggle" aria-label="Menu"><svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
  </nav>

  <header class="page-hero">
    <div class="ph-media" style="background-image:url('../assets/images/net-skincare-flatlay.jpg')"></div>
    <div class="container">
      <p class="section-eyebrow">Administration</p>
      <h1>Gestion des produits</h1>
      <p>Ajouter, modifier ou supprimer les articles de la boutique.</p>
    </div>
  </header>

  <section class="page">
    <div class="container" style="max-width:1180px;">
      <div class="admin-grid">
        <div>
          <div style="display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:14px;">
            <button class="btn-gold" type="button" id="loadBtn">Rafraîchir la liste</button>
            <span id="msg" class="muted" aria-live="polite"></span>
          </div>
          <div class="product-card" style="grid-column:span 12;">
            <div class="product-info"><div id="listWrap"></div></div>
          </div>
        </div>

        <div>
          <div class="product-card" style="grid-column:span 12;">
            <div class="product-info">
              <h4 style="font-size:22px;">Ajouter / Modifier</h4>
              <form id="productForm" class="form">
                <input type="hidden" name="id" id="pid" value="" />
                <select name="category_slug" id="categorySlug" required></select>
                <input name="sku" id="sku" placeholder="Référence (SKU)" required />
                <input name="name" id="pname" placeholder="Nom du produit" required />
                <textarea name="description" id="pdesc" placeholder="Description" rows="4" required></textarea>
                <input name="price_fcfa" id="pprice" placeholder="Prix (FCFA)" type="number" required />
                <input name="image_url" id="pimg" placeholder="URL de l'image (assets/images/...)" />
                <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                  <button class="btn-outline" type="button" id="pickMediaBtn"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 14l5-4 4 3 3-2 6 5"/><circle cx="9" cy="9" r="1.4"/></svg> Importer (galerie / fichiers)</button>
                  <span class="muted" id="mediaName" style="font-size:12.5px;"></span>
                </div>
                <input type="file" id="mediaFile" accept="image/*,video/*" style="display:none;" />
                <div id="mediaPreview" style="display:none; margin-top:6px;"></div>
                <select name="is_featured" id="pfeat" required>
                  <option value="0">Produit standard</option>
                  <option value="1">Produit vedette</option>
                </select>
                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                  <button class="btn-gold" type="submit">Enregistrer</button>
                  <button class="btn-ghost" type="button" id="resetBtn">Réinitialiser</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="../assets/js/catalog.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    const token = () => localStorage.getItem('yayra_token') || '';
    const isDemo = () => (localStorage.getItem('yayra_token')||'').indexOf('demo') === 0;
    const msg = document.getElementById('msg');
    const listWrap = document.getElementById('listWrap');
    const form = document.getElementById('productForm');

    function setFormFromProduct(p){
      document.getElementById('pid').value = p.id;
      document.getElementById('categorySlug').value = p.category_slug || '';
      document.getElementById('sku').value = p.sku || '';
      document.getElementById('pname').value = p.name || '';
      document.getElementById('pdesc').value = p.description || '';
      document.getElementById('pprice').value = p.price_fcfa || 0;
      document.getElementById('pimg').value = p.image_url || '';
      document.getElementById('pfeat').value = String(p.is_featured || 0);
      window.scrollTo({top:0, behavior:'smooth'});
    }
    function resetForm(){
      ['pid','sku','pname','pdesc','pprice','pimg'].forEach(id=> document.getElementById(id).value='');
      document.getElementById('pfeat').value = '0';
    }
    document.getElementById('logoutBtn').addEventListener('click', ()=>{ localStorage.removeItem('yayra_token'); window.location.href = '../client/login.html'; });

    function catCats(){ return (window.YAYRA_CATALOG ? window.YAYRA_CATALOG.categories : []); }
    function catProducts(){ return (window.YAYRA_CATALOG ? window.YAYRA_CATALOG.products.slice() : []); }

    async function loadCategoriesIntoSelect(){
      const sel = document.getElementById('categorySlug');
      let cats = [];
      try{
        const res = await fetch('../api/categories.php?action=list');
        const d = await res.json();
        cats = (d && d.categories && d.categories.length) ? d.categories : catCats();
      }catch(e){ cats = catCats(); }
      sel.innerHTML = '';
      cats.forEach(c=>{ const opt = document.createElement('option'); opt.value = c.slug; opt.textContent = c.name; sel.appendChild(opt); });
    }

    async function loadProducts(){
      const t = token();
      if(!t){ window.location.href = '../client/login.html'; return; }
      msg.textContent = 'Chargement...';
      listWrap.innerHTML = '';
      let products = [];
      try{
        const res = await fetch('../api/admin_products.php?action=list', { method:'GET', headers:{ 'Authorization':'Bearer ' + t } });
        const data = await res.json();
        products = (data && data.ok && data.products) ? data.products : catProducts();
      }catch(e){ products = catProducts(); }
      if(products.length === 0){ listWrap.innerHTML = '<p class="muted">Aucun produit.</p>'; msg.textContent=''; return; }
      if(isDemo()){ msg.innerHTML = '<span style="color:var(--gold)">Mode démonstration — catalogue en lecture seule.</span>'; } else { msg.textContent=''; }
      listWrap.innerHTML = '';
      products.forEach(p=>{
        const row = document.createElement('div');
        row.className = 'product-row';
        row.innerHTML = `
          <div style="flex:1;">
            <strong>${p.name}</strong><br/>
            <span class="muted" style="font-size:13px;">${p.category_slug || ''} · ${p.sku || ''} · ${(parseInt(p.price_fcfa,10)||0).toLocaleString('fr-FR')} FCFA</span>
          </div>
          <div style="display:flex; flex-direction:column; gap:8px; align-items:flex-end;">
            <button class="small-btn" type="button" data-edit data-id="${p.id}">Modifier</button>
            <button class="small-btn danger" type="button" data-del data-id="${p.id}">Supprimer</button>
          </div>`;
        row.querySelector('[data-edit]').addEventListener('click', ()=>setFormFromProduct(p));
        row.querySelector('[data-del]').addEventListener('click', async ()=>{
          if(isDemo()){ alert('Mode démonstration : la suppression est désactivée (backend requis).'); return; }
          if(!confirm('Supprimer ce produit ?')) return;
          const res = await fetch('../api/admin_products.php?action=delete', {
            method:'POST', headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + token() },
            body: JSON.stringify({ id: p.id })
          });
          const d = await res.json();
          if(!d.ok){ alert(d.error || 'Erreur'); return; }
          await loadProducts();
        });
        listWrap.appendChild(row);
      });
      if(!isDemo()) msg.textContent='';
    }

    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const t = token();
      if(!t){ window.location.href = '../client/login.html'; return; }
      const id = document.getElementById('pid').value;
      const payload = {
        id: id ? parseInt(id,10) : null,
        category_slug: document.getElementById('categorySlug').value,
        sku: document.getElementById('sku').value.trim(),
        name: document.getElementById('pname').value.trim(),
        description: document.getElementById('pdesc').value.trim(),
        price_fcfa: parseInt(document.getElementById('pprice').value,10) || 0,
        image_url: document.getElementById('pimg').value.trim(),
        is_featured: parseInt(document.getElementById('pfeat').value,10) ? 1 : 0,
      };
      msg.textContent = 'Enregistrement...';
      const res = await fetch('../api/admin_products.php?action=upsert', {
        method:'POST', headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer ' + t },
        body: JSON.stringify(payload)
      });
      const d = await res.json();
      if(!d.ok){ msg.textContent = d.error || 'Erreur'; return; }
      msg.textContent = 'Enregistré.';
      resetForm();
      await loadProducts();
    });

    document.getElementById('resetBtn').addEventListener('click', resetForm);
    document.getElementById('loadBtn').addEventListener('click', loadProducts);

    // Importer une image / vidéo depuis la galerie ou les fichiers (téléphone ou PC)
    document.getElementById('pickMediaBtn').addEventListener('click', ()=> document.getElementById('mediaFile').click());
    document.getElementById('mediaFile').addEventListener('change', (e)=>{
      const f = e.target.files && e.target.files[0]; if(!f) return;
      const nameEl = document.getElementById('mediaName');
      const prev = document.getElementById('mediaPreview');
      nameEl.textContent = f.name + ' · ' + Math.round(f.size/1024) + ' Ko';
      const isVideo = (f.type.indexOf('video') === 0);
      if(f.size > 3*1024*1024){ nameEl.textContent += ' — volumineux (sur le serveur réel, l\'envoi sera direct)'; }
      const reader = new FileReader();
      reader.onload = ()=>{
        document.getElementById('pimg').value = reader.result;
        prev.style.display = '';
        prev.innerHTML = isVideo
          ? '<video src="'+reader.result+'" style="width:100%; max-height:220px; border-radius:12px;" muted controls playsinline></video>'
          : '<img src="'+reader.result+'" alt="aperçu" style="width:100%; max-height:220px; object-fit:cover; border-radius:12px;" />';
      };
      reader.readAsDataURL(f);
    });

    document.addEventListener('DOMContentLoaded', async ()=>{ await loadCategoriesIntoSelect(); await loadProducts(); });
  </script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/livebadge.js"></script>
  <script src="../assets/js/xofix.js"></script>
</body>
</html>
