  <meta name="theme-color" content="#1c140b">
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-logo"><a href="../index.html"><span class="logo-y">Y</span>AYRA <span class="logo-sub">Nail Shop</span></a></div>
    <ul class="nav-links">
      <li><a href="index.html">Tableau de bord</a></li>
      <li><a href="admin-products.html">Produits</a></li>
      <li><a href="admin-orders.html">Commandes</a></li>
      <li><a href="admin-kits.html">Kits</a></li>
      <li><a href="admin-videos.html">Vidéos</a></li>
      <li><a href="admin-history.html" class="active">Directs</a></li>
      <li><a href="admin-contacts.html">Contacts</a></li>
      <li><a href="admin-staff.html">Employés</a></li>
    </ul>
    <div class="nav-actions">
      <button class="btn-outline" type="button" id="logoutBtn">Se déconnecter</button>
    </div>
    <button class="menu-toggle" id="menuToggle" aria-label="Menu"><svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
  </nav>

  <header class="page-hero">
    <div class="ph-media" style="background-image:url('../assets/images/net-makeup-marble.jpg')"></div>
    <div class="container">
      <p class="section-eyebrow">Administration</p>
      <h1>Historique des directs</h1>
      <p>Chaque direct terminé est enregistré automatiquement avec ses statistiques. Les directs sont indépendants les uns des autres.</p>
    </div>
  </header>

  <section class="page">
    <div class="container" style="max-width:1000px;">
      <div id="msg" class="muted" aria-live="polite" style="margin-bottom:16px;"></div>
      <div class="product-card" style="grid-column:span 12;">
        <div class="product-info"><div id="histWrap"></div></div>
      </div>
    </div>
  </section>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/live-core.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    if(!localStorage.getItem('yayra_token')) window.location.href = '../client/login.html';
    document.getElementById('logoutBtn').addEventListener('click', ()=>{ localStorage.removeItem('yayra_token'); window.location.href = '../client/login.html'; });
    const wrap = document.getElementById('histWrap');
    const msg = document.getElementById('msg');
    const ready = (window.FIREBASE_READY && LIVE.init());

    function dur(s){ s = parseInt(s,10)||0; const m = Math.floor(s/60), r = s%60; return (m>0 ? m+' min ' : '') + r + ' s'; }
    function dateFr(ms){ try{ return new Date(Number(ms)).toLocaleString('fr-FR'); }catch(e){ return ''; } }

    async function load(){
      if(!ready){ wrap.innerHTML = '<p class="muted">Configurez le live (Firebase) pour enregistrer l\'historique des directs.</p>'; return; }
      msg.textContent = 'Chargement...';
      try{
        const snap = await LIVE.ref('live_history').once('value');
        const v = snap.val() || {};
        const list = Object.keys(v).map(k=> Object.assign({ _id:k }, v[k])).sort((a,b)=> (b.endedAt||0) - (a.endedAt||0));
        msg.textContent = '';
        if(!list.length){ wrap.innerHTML = '<p class="muted">Aucun direct enregistré pour le moment. Lancez puis arrêtez un direct depuis le Studio.</p>'; return; }
        let html = '<div class="table-wrap"><table class="table"><thead><tr><th>Date</th><th>Durée</th><th>Spectateurs (pic)</th><th>J\'aime</th><th>Commentaires</th></tr></thead><tbody>';
        list.forEach(d=>{ html += '<tr><td>'+dateFr(d.startedAt)+'</td><td>'+dur(d.duration)+'</td><td>'+(d.peak||0)+'</td><td>'+(d.likes||0)+'</td><td>'+(d.comments||0)+'</td></tr>'; });
        html += '</tbody></table></div>';
        wrap.innerHTML = html;
      }catch(e){ wrap.innerHTML = '<p class="muted">Impossible de charger l\'historique.</p>'; msg.textContent=''; }
    }
    document.addEventListener('DOMContentLoaded', load);
  </script>
  <script src="../assets/js/livebadge.js"></script>
  <script src="../assets/js/xofix.js"></script>
</body>
</html>
