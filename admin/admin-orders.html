<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Commandes</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo"><a href="../index.html"><span class="logo-y">Y</span>AYRA</a></div>
    <div class="nav-actions">
      <button class="btn-outline" type="button" id="logoutBtn">Se déconnecter</button>
    </div>
  </nav>

  <section class="page">
    <div class="container" style="max-width:1200px;">
      <div class="section-header">
        <p class="section-eyebrow">Admin</p>
        <h2 class="section-title">Commandes</h2>
        <p class="section-sub">Gérer les commandes et mettre à jour les statuts</p>
      </div>

      <div id="msg" class="muted" aria-live="polite" style="margin-bottom:14px;"></div>
      
      <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px;">
        <button class="btn-gold" type="button" id="loadBtn">Rafraîchir la liste</button>
      </div>

      <div id="ordersWrap" style="overflow-x:auto;"></div>
    </div>
  </section>

  <script src="../assets/js/main.js"></script>
  <script>
    const token = () => localStorage.getItem('yayra_token') || '';
    const wrap = document.getElementById('ordersWrap');
    const msg = document.getElementById('msg');

    document.getElementById('logoutBtn').addEventListener('click', ()=>{
      localStorage.removeItem('yayra_token');
      window.location.href = '../client/login.html';
    });

    document.getElementById('loadBtn').addEventListener('click', loadOrders);

    async function updateOrderStatus(orderId, newStatus) {
      const t = token();
      if (!t) { window.location.href = '../client/login.html'; return; }

      try {
        const res = await fetch('../api/admin_orders.php?action=update_status', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + t
          },
          body: JSON.stringify({ id: orderId, status: newStatus })
        });
        const data = await res.json();
        if (!data.ok) {
          alert(data.error || 'Erreur');
          return;
        }
        msg.textContent = '✓ Statut mis à jour';
        await loadOrders();
      } catch (e) {
        msg.textContent = 'Erreur réseau';
      }
    }

    async function loadOrders(){
      const t = token();
      if(!t){ window.location.href = '../client/login.html'; return; }
      msg.textContent = 'Chargement...';
      wrap.innerHTML = '';

      try{
        const res = await fetch('../api/admin_orders.php?action=list', {
          method: 'GET',
          headers: { 'Authorization': 'Bearer ' + t }
        });
        const data = await res.json();
        if(!data.ok){
          msg.textContent = data.error || 'Erreur session.';
          return;
        }

        const orders = data.orders || [];
        if(orders.length === 0){
          wrap.innerHTML = '<p class="muted">Aucune commande.</p>';
          msg.textContent = '';
          return;
        }

        let html = '<table class="table" style="width:100%; border-collapse:collapse;"><thead style="background:rgba(17,18,23,.02);"><tr style="border-bottom:2px solid rgba(17,18,23,.08);"><th style="padding:12px; text-align:left; font-weight:700;">ID</th><th style="padding:12px; text-align:left; font-weight:700;">Client</th><th style="padding:12px; text-align:left; font-weight:700;">Téléphone</th><th style="padding:12px; text-align:left; font-weight:700;">Adresse</th><th style="padding:12px; text-align:left; font-weight:700;">Articles</th><th style="padding:12px; text-align:left; font-weight:700;">Total</th><th style="padding:12px; text-align:left; font-weight:700;">Statut</th><th style="padding:12px; text-align:left; font-weight:700;">Date</th></tr></thead><tbody>';
        
        for(const o of orders){
          const statusOptions = ['pending', 'confirmed', 'shipped', 'delivered', 'cancelled'];
          let statusHtml = '<select style="padding:6px; border:1px solid rgba(17,18,23,.08); border-radius:4px; background:#fff; cursor:pointer;" onchange="updateOrderStatus(' + o.id + ', this.value)">';
          for (const s of statusOptions) {
            statusHtml += '<option value="' + s + '"' + (o.status === s ? ' selected' : '') + '>' + s + '</option>';
          }
          statusHtml += '</select>';

          html += '<tr style="border-bottom:1px solid rgba(17,18,23,.04);"><td style="padding:12px;">' + o.id + '</td><td style="padding:12px;">' + (o.full_name || '') + '</td><td style="padding:12px;">' + (o.phone || '') + '</td><td style="padding:12px; font-size:12px; color:var(--muted);">' + (o.address || '') + '</td><td style="padding:12px;">' + (o.items_count || 0) + ' article(s)</td><td style="padding:12px; font-weight:700;">' + (parseInt(o.total_fcfa,10)||0).toLocaleString('fr-FR') + ' FCFA</td><td style="padding:12px;">' + statusHtml + '</td><td style="padding:12px; font-size:12px; color:var(--muted);">' + (o.created_at || '') + '</td></tr>';
        }
        html += '</tbody></table>';
        wrap.innerHTML = html;
        msg.textContent = '';
      }catch(e){
        msg.textContent = 'Erreur réseau.';
      }
    }

    document.addEventListener('DOMContentLoaded', loadOrders);
  </script>
</body>
</html>
