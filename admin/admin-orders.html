<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAYRA Nail Shop — Admin · Commandes</title>
  <meta name="theme-color" content="#1c140b">
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../assets/favicon.svg" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="../assets/js/admin-guard.js"></script>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-logo"><a href="../index.html"><span class="logo-y">Y</span>AYRA <span class="logo-sub">Nail Shop</span></a></div>
    <ul class="nav-links">
      <li><a href="index.html">Tableau de bord</a></li>
      <li><a href="admin-products.html">Produits</a></li>
      <li><a href="admin-orders.html" class="active">Commandes</a></li>
      <li><a href="admin-kits.html">Kits</a></li>
      <li><a href="admin-videos.html">Vidéos</a></li>
      <li><a href="admin-history.html">Directs</a></li>
      <li><a href="admin-chat.html">Messages</a></li>
      <li><a href="admin-contacts.html">Contacts</a></li>
      <li><a href="admin-appointments.html">Rendez-vous</a></li>
      <li><a href="admin-staff.html">Employés</a></li>
    </ul>
    <div class="nav-actions">
      <button class="btn-outline" type="button" id="logoutBtn">Se déconnecter</button>
    </div>
    <button class="menu-toggle" id="menuToggle" aria-label="Menu"><svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
  </nav>

  <header class="page-hero">
    <div class="ph-media" style="background-image:url('../assets/images/net-makeup-marble.jpg')"></div>
    <div class="container">
      <p class="section-eyebrow">Administration</p>
      <h1>Commandes</h1>
      <p>Suivi des commandes passées sur la boutique en ligne.</p>
    </div>
  </header>

  <section class="page">
    <div class="container" style="max-width:1080px;">
      <div id="msg" class="muted" aria-live="polite" style="margin-bottom:16px;"></div>
      <div class="product-card" style="grid-column:span 12;">
        <div class="product-info">
          <div id="ordersWrap"></div>
        </div>
      </div>
    </div>
  </section>

  <script src="../assets/js/main.js"></script>
  <script>
    const wrap = document.getElementById('ordersWrap');
    const msg = document.getElementById('msg');
    document.getElementById('logoutBtn').addEventListener('click', ()=>{ localStorage.removeItem('yayra_token'); window.location.href = '../client/login.html'; });
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=> ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    function fiche(o){
      const O = window.YAYRA_ORDERS;
      const paid = o.status === 'paid';
      const disc = (o.discount_fcfa||0) > 0;
      const eff = O.effectiveTotal(o);
      const items = (o.items||[]).map(it=> '<tr><td style="font-weight:600;color:var(--ink);">'+esc(it.name)+'</td><td>×'+(it.qty||1)+'</td><td>'+O.fcfa(it.price_fcfa)+'</td><td>'+O.fcfa((it.price_fcfa||0)*(it.qty||0))+'</td></tr>').join('');
      const head = paid
        ? '<span class="order-stamp">Payé</span>' + (o.paidStr ? '<p class="muted" style="margin:6px 0 0;font-size:13px;">le '+esc(o.paidStr)+'</p>' : '')
        : '<span style="background:var(--gold);color:#1a1206;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;">En attente de paiement</span>';
      const totalHtml = disc
        ? '<strong style="font-size:18px;">Total : <span class="muted" style="text-decoration:line-through;font-weight:400;font-size:14px;">'+O.fcfa(o.total_fcfa)+'</span> <span style="color:var(--gold);">'+O.fcfa(eff)+'</span></strong> <span class="muted" style="font-size:13px;">(réduction −'+O.fcfa(o.discount_fcfa)+')</span>'
        : '<strong style="font-size:18px;">Total : <span style="color:var(--gold);">'+O.fcfa(o.total_fcfa)+'</span></strong>';
      const payBtn = paid ? '' : '<button class="btn-gold" data-pay="'+esc(o.id)+'" type="button">Confirmer le paiement</button>';
      const invBtn = '<button class="btn-outline" data-invoice="'+esc(o.id)+'" type="button">Facture proforma (WhatsApp)</button>';
      const discCtrl = '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px;border-top:1px dashed var(--line);padding-top:12px;">'
        +   '<span class="muted" style="font-size:13px;">Réduction :</span>'
        +   '<input type="number" min="0" placeholder="Montant FCFA" data-discin="'+esc(o.id)+'" value="'+(o.discount_fcfa||'')+'" style="width:140px;padding:9px 12px;border-radius:10px;border:1px solid var(--line-2);background:var(--paper);color:var(--ink);" />'
        +   '<button class="btn-outline" data-disc="'+esc(o.id)+'" type="button">Appliquer la réduction</button></div>';
      return '<div class="order-fiche" style="border:1px solid var(--line-2);border-radius:var(--r-md);padding:20px;margin-bottom:18px;background:var(--paper);">'
        + '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:14px;">'
        +   '<div><div class="footer-logo" style="font-size:22px;"><span class="logo-y">Y</span>AYRA <span class="logo-sub">Nail Shop</span></div>'
        +   '<p class="muted" style="margin:4px 0 0;font-size:13px;">Fiche commande · '+esc(o.ref||o.id)+'</p></div>'
        +   '<div style="text-align:right;">'+head+'<p class="muted" style="margin:6px 0 0;font-size:13px;">🗓 '+esc(o.createdStr||'')+'</p></div>'
        + '</div>'
        + '<div style="margin-bottom:14px;">'
        +   '<p style="margin:0;"><strong>'+esc(o.full_name||'—')+'</strong></p>'
        +   '<p class="muted" style="margin:2px 0 0;">📞 '+esc(o.phone||'—')+'</p>'
        +   '<p class="muted" style="margin:2px 0 0;">📍 '+esc(o.address||'(adresse non renseignée)')+'</p>'
        + '</div>'
        + '<div class="table-wrap"><table class="table"><thead><tr><th>Produit</th><th>Qté</th><th>Prix</th><th>Total</th></tr></thead><tbody>'+items+'</tbody></table></div>'
        + '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-top:14px;">'
        +   totalHtml + '<div style="display:flex;gap:10px;flex-wrap:wrap;">'+payBtn+invBtn+'</div>'
        + '</div>'
        + discCtrl
        + '</div>';
    }

    async function render(){
      if(!localStorage.getItem('yayra_token')){ window.location.href = '../client/login.html'; return; }
      if(!window.YAYRA_ORDERS){ wrap.innerHTML = '<p class="muted">Chargement du module…</p>'; return; }
      if(!wrap.innerHTML) msg.textContent = 'Chargement...';
      const orders = await window.YAYRA_ORDERS.listAll();
      if(!orders.length){ wrap.innerHTML = '<p class="muted">Aucune commande pour le moment.</p>'; msg.textContent = ''; return; }
      const pending = orders.filter(o=> o.status !== 'paid').length;
      msg.innerHTML = orders.length + ' commande(s) · <strong>'+pending+'</strong> en attente de paiement';
      const byId = {}; orders.forEach(o=> byId[o.id] = o);
      wrap.innerHTML = orders.map(fiche).join('');
      const O = window.YAYRA_ORDERS;
      // Confirmer le paiement -> tampon Payé
      wrap.querySelectorAll('[data-pay]').forEach(b=> b.addEventListener('click', async ()=>{
        b.disabled = true; b.textContent = 'Validation...';
        await O.confirmPaid(b.getAttribute('data-pay'));
        render();
      }));
      // Appliquer une réduction -> notifiée à la cliente
      wrap.querySelectorAll('[data-disc]').forEach(b=> b.addEventListener('click', async ()=>{
        const id = b.getAttribute('data-disc');
        const input = wrap.querySelector('[data-discin="'+id+'"]');
        const amount = input ? parseInt(input.value,10)||0 : 0;
        b.disabled = true; b.textContent = 'Application...';
        await O.applyDiscount(id, amount);
        render();
      }));
      // Envoyer la facture proforma à la cliente par WhatsApp (1 clic)
      wrap.querySelectorAll('[data-invoice]').forEach(b=> b.addEventListener('click', ()=>{
        const o = byId[b.getAttribute('data-invoice')]; if(!o) return;
        if(!O.intlDigits(o.phone)){ alert('Numéro de la cliente manquant ou invalide.'); return; }
        window.open(O.waInvoiceUrl(o), '_blank');
      }));
    }
    document.addEventListener('DOMContentLoaded', render);
    setInterval(render, 20000); // nouvelles commandes en quasi temps réel
  </script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/orders.js"></script>
  <script src="../assets/js/livebadge.js"></script>
  <script src="../assets/js/xofix.js"></script>
  <script src="../assets/js/account.js"></script>
  <script src="../assets/js/sw-register.js"></script>
</body>
</html>
