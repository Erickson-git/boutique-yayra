<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Commandes</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo"><a href="../index.html"><span class="logo-y">Y</span>AYRA</a></div>
    <div class="nav-actions">
      <button class="btn-outline" type="button" id="logoutBtn">Se déconnecter</button>
    </div>
  </nav>

  <section class="page">
    <div class="container" style="max-width:1000px;">
      <div class="section-header">
        <p class="section-eyebrow">Admin</p>
        <h2 class="section-title">Commandes</h2>
      </div>

      <div id="msg" class="muted" aria-live="polite" style="margin-bottom:14px;"></div>
      <div id="ordersWrap"></div>
    </div>
  </section>

  <script src="../assets/js/main.js"></script>
  <script>
    const token = () => localStorage.getItem('yayra_token') || '';
    const wrap = document.getElementById('ordersWrap');
    const msg = document.getElementById('msg');

    document.getElementById('logoutBtn').addEventListener('click', ()=>{
      localStorage.removeItem('yayra_token');
      window.location.href = '../client/login.html';
    });

    async function loadOrders(){
      const t = token();
      if(!t){ window.location.href = '../client/login.html'; return; }
      msg.textContent = 'Chargement...';
      wrap.innerHTML = '';

      try{
        const res = await fetch('../api/orders.php?action=list', {
          method: 'GET',
          headers: { 'Authorization': 'Bearer ' + t }
        });
        const data = await res.json();
        if(!data.ok){
          msg.textContent = data.error || 'Erreur session.';
          return;
        }

        const orders = data.orders || [];
        if(orders.length === 0){
          wrap.innerHTML = '<p class="muted">Aucune commande.</p>';
          msg.textContent = '';
          return;
        }

        let html = '<div class="table-wrap"><table class="table"><thead><tr><th>ID</th><th>Client</th><th>Total</th><th>Statut</th><th>Date</th></tr></thead><tbody>';
        for(const o of orders){
          html += `<tr><td>${o.id}</td><td>${o.full_name || ''}<br/><span style="color:rgba(255,255,255,.7); font-weight:700;">${o.phone || ''}</span></td><td>${(parseInt(o.total_fcfa,10)||0).toLocaleString('fr-FR')} FCFA</td><td>${o.status}</td><td>${o.created_at || ''}</td></tr>`;
        }
        html += '</tbody></table></div>';
        wrap.innerHTML = html;
        msg.textContent = '';
      }catch(e){
        msg.textContent = 'Erreur réseau.';
      }
    }

    document.addEventListener('DOMContentLoaded', loadOrders);
  </script>
</body>
</html>
