<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>YAYRA Finances</title>
  <meta name="theme-color" content="#b1813a">
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.png" />
  <link rel="manifest" href="finances.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="../assets/js/admin-guard.js"></script>
  <style>
    .fin-wrap{max-width:1080px;margin:0 auto;padding:0 clamp(14px,4vw,28px) 60px}
    .fin-top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;padding:18px 0}
    .fin-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:6px 0 18px}
    .fin-controls select{padding:10px 12px;border-radius:10px;border:1px solid var(--line-2);background:var(--paper);color:var(--ink);font-family:inherit}
    .fin-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
    .kpi{border:1px solid var(--line-2);border-radius:var(--r-md);padding:16px;background:var(--paper)}
    .kpi b{display:block;font-family:var(--serif);font-size:26px;line-height:1.1;color:var(--ink)}
    .kpi.gold b{color:var(--gold)} .kpi.pos b{color:#1f7a3f} .kpi.neg b{color:#c2410c}
    .kpi span{font-size:13px;color:var(--ink-soft)}
    .fin-card{border:1px solid var(--line-2);border-radius:var(--r-md);padding:18px;background:var(--paper);margin-top:18px}
    .fin-card h3{font-family:var(--serif);font-size:22px;margin:0 0 14px}
    #finChart{width:100%;height:260px;display:block}
    .fin-form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .fin-form .full{grid-column:1 / -1}
    .fin-form label{font-size:13px;color:var(--ink-soft);display:block;margin-bottom:5px}
    .fin-form input,.fin-form select,.fin-form textarea{width:100%;padding:12px 13px;border-radius:10px;border:1px solid var(--line-2);background:#fff;color:var(--ink);font-family:inherit}
    .fin-form textarea{min-height:74px;resize:vertical}
    .fin-alert{display:none;background:#fff3e6;border:1px solid #e0a868;color:#9a5b14;border-radius:12px;padding:12px 15px;margin:14px 0;font-weight:600}
    .fin-banner{background:var(--bg-2);border:1px solid var(--line-2);border-radius:12px;padding:11px 14px;margin:14px 0;font-size:13px;color:var(--ink-soft)}
    @media(max-width:560px){ .fin-form{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-logo"><a href="index.html"><span class="logo-y">Y</span>AYRA <span class="logo-sub">Finances</span></a></div>
    <div class="nav-actions">
      <button class="btn-outline" type="button" id="installBtn" style="display:none;">Installer l'app</button>
      <a class="btn-outline" href="index.html">Admin</a>
      <button class="btn-outline" type="button" id="logoutBtn">Déconnexion</button>
    </div>
  </nav>

  <header class="page-hero" style="padding:60px 0 36px;">
    <div class="ph-media" style="background-image:url('../assets/images/net-makeup-marble.jpg')"></div>
    <div class="container">
      <p class="section-eyebrow">Gestion financière</p>
      <h1>Recettes &amp; bénéfices</h1>
      <p>Saisie quotidienne par boutique, études automatiques et factures.</p>
    </div>
  </header>

  <div class="fin-wrap">
    <div id="finAlert" class="fin-alert"></div>
    <div id="syncNote" class="fin-banner" style="display:none;"></div>

    <div class="fin-controls">
      <select id="fBoutique"><option value="">Toutes les boutiques</option></select>
      <select id="fPeriod">
        <option value="month">Ce mois-ci</option>
        <option value="week">7 derniers jours</option>
        <option value="all">Tout</option>
      </select>
      <button class="btn-outline" type="button" id="notifBtn">🔔 Activer les rappels</button>
    </div>

    <div class="fin-kpis" id="kpis"></div>

    <div class="fin-card">
      <h3>Courbe recettes &amp; dépenses</h3>
      <canvas id="finChart"></canvas>
      <p class="muted" style="font-size:12px;margin:8px 0 0;"><span style="color:var(--gold);">●</span> Recettes &nbsp; <span style="color:#c2876a;">●</span> Dépenses</p>
    </div>

    <div class="fin-card">
      <h3>Saisie du jour</h3>
      <form class="fin-form" id="finForm">
        <div><label>Boutique *</label><select name="boutique" id="inBoutique" required></select></div>
        <div><label>Date *</label><input type="date" name="date" id="inDate" required /></div>
        <div><label>Recette (FCFA) *</label><input type="number" name="recette" id="inRecette" min="0" inputmode="numeric" required placeholder="0" /></div>
        <div><label>Dépenses (FCFA)</label><input type="number" name="depense" id="inDepense" min="0" inputmode="numeric" placeholder="0" /></div>
        <div><label>Nombre de ventes</label><input type="number" name="ventes" id="inVentes" min="0" inputmode="numeric" placeholder="0" /></div>
        <div><label>Reste estimé</label><input type="text" id="inReste" readonly value="0 FCFA" style="background:var(--bg-2);font-weight:600;" /></div>
        <div class="full"><label>Commentaire</label><textarea name="comment" id="inComment" placeholder="Remarques du jour : promo, jour férié, incident, gros achat de stock…"></textarea></div>
        <div class="full" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
          <button class="btn-gold" type="submit">Enregistrer la recette</button>
          <span class="muted" id="formMsg" aria-live="polite" style="font-size:14px;"></span>
        </div>
      </form>
    </div>

    <div class="fin-card">
      <h3>Détail des recettes</h3>
      <div id="histWrap"></div>
    </div>
  </div>

  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/finances.js"></script>
  <script>
    const F = window.YAYRA_FINANCES;
    const $ = (id)=> document.getElementById(id);
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=> ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    document.getElementById('logoutBtn').addEventListener('click', ()=>{ localStorage.removeItem('yayra_token'); if(window.YAYRA_STAFF) try{YAYRA_STAFF.clearSession();}catch(e){} window.location.href = '../client/login.html'; });

    // Remplir les sélecteurs de boutique
    F.BOUTIQUES.forEach(b=>{
      const o1=document.createElement('option'); o1.value=b.slug; o1.textContent=b.name; $('fBoutique').appendChild(o1);
      const o2=document.createElement('option'); o2.value=b.slug; o2.textContent=b.name; $('inBoutique').appendChild(o2);
    });
    $('inDate').value = F.todayStr();

    function periodOpts(){
      const p = $('fPeriod').value;
      const o = { boutique: $('fBoutique').value || '' };
      if(p === 'month') o.from = F.monthStart();
      else if(p === 'week') o.from = F.daysAgoStr(6);
      return o;
    }

    function renderKPIs(){
      const t = F.totals(periodOpts());
      const todayB = $('fBoutique').value;
      let recetteJour = 0;
      (todayB ? [todayB] : F.BOUTIQUES.map(b=>b.slug)).forEach(s=>{ const d=F.getDay(s, F.todayStr()); if(d) recetteJour += d.recette; });
      $('kpis').innerHTML =
        '<div class="kpi gold"><b>'+F.fcfa(recetteJour)+'</b><span>Recette du jour</span></div>'
        + '<div class="kpi gold"><b>'+F.fcfa(t.recette)+'</b><span>Recettes (période)</span></div>'
        + '<div class="kpi"><b>'+F.fcfa(t.depense)+'</b><span>Dépenses</span></div>'
        + '<div class="kpi '+(t.reste>=0?'pos':'neg')+'"><b>'+F.fcfa(t.reste)+'</b><span>Bénéfice (reste)</span></div>'
        + '<div class="kpi"><b>'+t.ventes+'</b><span>Ventes</span></div>'
        + '<div class="kpi"><b>'+F.fcfa(t.moyenne)+'</b><span>Moyenne / jour</span></div>';
    }

    function frShort(s){ const a=String(s).split('-'); return a.length===3 ? (a[2]+'/'+a[1]) : s; }
    function drawChart(){
      const data = F.series(periodOpts());
      const canvas = $('finChart'); const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio||1, W=canvas.clientWidth, H=canvas.clientHeight;
      canvas.width=W*dpr; canvas.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,W,H);
      const pad={l:52,r:14,t:14,b:26}, cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
      if(!data.length){ ctx.fillStyle='#9b8f7e'; ctx.font='14px Jost,sans-serif'; ctx.fillText('Aucune donnée pour cette période.', pad.l, pad.t+ch/2); return; }
      const max=Math.max(1, ...data.map(d=> Math.max(d.recette,d.depense)));
      const n=data.length;
      const X=i=> pad.l + (n===1? cw/2 : cw*i/(n-1));
      const Y=v=> pad.t + ch - ch*(v/max);
      ctx.strokeStyle='rgba(0,0,0,.08)'; ctx.fillStyle='#9b8f7e'; ctx.font='11px Jost,sans-serif';
      for(let g=0; g<=4; g++){ const v=max*g/4, yy=Y(v); ctx.beginPath(); ctx.moveTo(pad.l,yy); ctx.lineTo(W-pad.r,yy); ctx.stroke(); ctx.fillText((Math.round(v/1000))+'k', 6, yy+4); }
      function line(key,color,fill){
        ctx.beginPath(); data.forEach((d,i)=>{ const xx=X(i),yy=Y(d[key]); i?ctx.lineTo(xx,yy):ctx.moveTo(xx,yy); });
        ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.stroke();
        if(fill){ ctx.lineTo(X(n-1),Y(0)); ctx.lineTo(X(0),Y(0)); ctx.closePath(); ctx.fillStyle=fill; ctx.fill(); }
        data.forEach((d,i)=>{ ctx.beginPath(); ctx.arc(X(i),Y(d[key]),3,0,Math.PI*2); ctx.fillStyle=color; ctx.fill(); });
      }
      line('recette','#b1813a','rgba(177,129,58,.10)');
      line('depense','#c2876a',null);
      ctx.fillStyle='#9b8f7e'; ctx.font='11px Jost,sans-serif'; ctx.textAlign='center';
      Array.from(new Set([0, Math.floor((n-1)/2), n-1])).forEach(i=>{ ctx.fillText(frShort(data[i].date), X(i), H-7); });
      ctx.textAlign='left';
    }

    function receiptHTML(e){
      const bn = F.boutiqueName(e.boutique);
      return '<!DOCTYPE html><html lang=fr><head><meta charset=utf-8><title>Reçu '+e.date+'</title>'
        + '<style>body{font-family:Arial,Helvetica,sans-serif;color:#251b11;max-width:560px;margin:0 auto;padding:34px}'
        + '.logo{font-family:Georgia,serif;font-size:30px}.gold{color:#b1813a}hr{border:0;border-top:1px solid #e7ddcb;margin:16px 0}'
        + 'table{width:100%;border-collapse:collapse;margin:16px 0}td{padding:10px 6px;border-bottom:1px solid #eee}'
        + '.r{text-align:right}.tot td{font-size:20px;font-weight:bold;border-bottom:none;border-top:2px solid #251b11}</style></head><body>'
        + '<div class="logo"><span class="gold">Y</span>AYRA <span style="font-size:15px">Nail Shop</span></div>'
        + '<p style="color:#7a6f5e;margin:2px 0">Maison de beauté · Lomé</p><hr>'
        + '<h2 style="margin:0 0 4px">Reçu de recette</h2>'
        + '<p style="margin:0;color:#7a6f5e">Boutique : <b>'+esc(bn)+'</b> &nbsp;·&nbsp; Date : <b>'+F.frDate(e.date)+'</b></p>'
        + '<table>'
        + '<tr><td>Recette</td><td class="r">'+F.fcfa(e.recette)+'</td></tr>'
        + '<tr><td>Dépenses</td><td class="r">- '+F.fcfa(e.depense)+'</td></tr>'
        + (e.ventes? '<tr><td>Nombre de ventes</td><td class="r">'+e.ventes+'</td></tr>':'')
        + '<tr class="tot"><td>Reste (bénéfice)</td><td class="r">'+F.fcfa(e.reste)+'</td></tr>'
        + '</table>'
        + (e.comment? '<p><b>Commentaire :</b> '+esc(e.comment)+'</p>':'')
        + '<p style="margin-top:34px;color:#9b8f7e;font-size:12px">Document généré par YAYRA Finances.</p>'
        + '<scr'+'ipt>window.onload=function(){setTimeout(function(){window.print();},250);}</scr'+'ipt>'
        + '</body></html>';
    }
    function printReceipt(e){ const w=window.open('','_blank'); if(!w){ alert('Autorisez les pop-ups pour imprimer/enregistrer en PDF.'); return; } w.document.write(receiptHTML(e)); w.document.close(); }
    function shareReceipt(e){
      const bn=F.boutiqueName(e.boutique);
      const txt='🌸 *YAYRA Nail Shop* — Reçu de recette\nBoutique : '+bn+'\nDate : '+F.frDate(e.date)
        +'\nRecette : '+F.fcfa(e.recette)+'\nDépenses : '+F.fcfa(e.depense)+'\n*Reste : '+F.fcfa(e.reste)+'*'
        +(e.comment? '\nNote : '+e.comment : '');
      if(navigator.share){ navigator.share({ title:'Reçu '+bn, text:txt }).catch(()=>{}); }
      else { window.open('https://wa.me/?text='+encodeURIComponent(txt), '_blank'); }
    }

    function renderHist(){
      const rows = F.filterEntries(periodOpts()).slice().reverse(); // récent d'abord
      const wrap = $('histWrap');
      if(!rows.length){ wrap.innerHTML='<p class="muted">Aucune saisie pour cette période.</p>'; return; }
      let html='<div class="table-wrap"><table class="table"><thead><tr><th>Date</th><th>Boutique</th><th>Recette</th><th>Dépenses</th><th>Reste</th><th>Actions</th></tr></thead><tbody>';
      rows.forEach(e=>{
        html+='<tr>'
          +'<td>'+F.frDate(e.date)+'</td>'
          +'<td>'+esc(F.boutiqueName(e.boutique))+'</td>'
          +'<td style="color:var(--gold);font-weight:600;">'+F.fcfa(e.recette)+'</td>'
          +'<td>'+F.fcfa(e.depense)+'</td>'
          +'<td style="font-weight:600;color:'+(e.reste>=0?'#1f7a3f':'#c2410c')+';">'+F.fcfa(e.reste)+'</td>'
          +'<td style="white-space:nowrap;">'
          +'<button class="small-btn" data-print="'+e.id+'">Facture</button> '
          +'<button class="small-btn" data-share="'+e.id+'">Partager</button> '
          +'<button class="small-btn" data-edit="'+e.id+'">Modifier</button> '
          +'<button class="small-btn danger" data-del="'+e.id+'">×</button>'
          +(e.comment? '<div class="muted" style="font-size:12px;margin-top:4px;max-width:320px;white-space:normal;">🗒 '+esc(e.comment)+'</div>':'')
          +'</td></tr>';
      });
      html+='</tbody></table></div>';
      wrap.innerHTML=html;
      const byId={}; rows.forEach(e=> byId[e.id]=e);
      wrap.querySelectorAll('[data-print]').forEach(b=> b.addEventListener('click', ()=> printReceipt(byId[b.getAttribute('data-print')])));
      wrap.querySelectorAll('[data-share]').forEach(b=> b.addEventListener('click', ()=> shareReceipt(byId[b.getAttribute('data-share')])));
      wrap.querySelectorAll('[data-edit]').forEach(b=> b.addEventListener('click', ()=> fillForm(byId[b.getAttribute('data-edit')])));
      wrap.querySelectorAll('[data-del]').forEach(b=> b.addEventListener('click', async ()=>{ if(confirm('Supprimer cette saisie ?')){ await F.remove(b.getAttribute('data-del')); refresh(); } }));
    }

    function fillForm(e){
      $('inBoutique').value=e.boutique; $('inDate').value=e.date; $('inRecette').value=e.recette||'';
      $('inDepense').value=e.depense||''; $('inVentes').value=e.ventes||''; $('inComment').value=e.comment||'';
      updateReste(); window.scrollTo({top:document.querySelector('#finForm').getBoundingClientRect().top+window.scrollY-90, behavior:'smooth'});
      $('formMsg').style.color=''; $('formMsg').textContent='Modification de la saisie du '+F.frDate(e.date)+' ('+F.boutiqueName(e.boutique)+').';
    }
    function updateReste(){ const r=parseInt($('inRecette').value,10)||0, d=parseInt($('inDepense').value,10)||0; $('inReste').value=F.fcfa(r-d); }
    $('inRecette').addEventListener('input', updateReste);
    $('inDepense').addEventListener('input', updateReste);

    function checkAlert(){
      const banner=$('finAlert'); const h=new Date().getHours();
      const missing=F.BOUTIQUES.filter(b=> F.missingToday(b.slug));
      if(missing.length && h>=22){
        const names=missing.map(b=>b.name).join(', ');
        banner.style.display='block';
        banner.textContent='⏰ Il est plus de 22h et la recette du jour n\'est pas encore enregistrée pour : '+names+'.';
        try{ if(window.Notification && Notification.permission==='granted' && !sessionStorage.getItem('fin_notified')){ new Notification('Recette non enregistrée', { body:'Saisir la recette du jour : '+names, icon:'../assets/icons/icon-192.png' }); sessionStorage.setItem('fin_notified','1'); } }catch(e){}
      } else if(missing.length){
        const names=missing.map(b=>b.name).join(', ');
        banner.style.display='block'; banner.style.background='var(--bg-2)'; banner.style.color='var(--ink-soft)'; banner.style.borderColor='var(--line-2)';
        banner.textContent='ℹ️ Recette du jour pas encore saisie pour : '+names+' (rappel automatique à 22h).';
      } else { banner.style.display='none'; }
    }

    function refresh(){ renderKPIs(); drawChart(); renderHist(); checkAlert(); }

    $('finForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const msg=$('formMsg');
      const boutique=$('inBoutique').value, date=$('inDate').value;
      if(!boutique){ msg.style.color='var(--rose)'; msg.textContent='Choisissez une boutique.'; return; }
      if(!date){ msg.style.color='var(--rose)'; msg.textContent='Choisissez une date.'; return; }
      if(($('inRecette').value||'')===''){ msg.style.color='var(--rose)'; msg.textContent='Entrez la recette.'; return; }
      await F.saveDay({ boutique, date, recette:$('inRecette').value, depense:$('inDepense').value, ventes:$('inVentes').value, comment:$('inComment').value });
      msg.style.color='var(--gold)'; msg.textContent='Recette enregistrée ✓ ('+F.boutiqueName(boutique)+' — '+F.frDate(date)+')';
      $('inRecette').value=''; $('inDepense').value=''; $('inVentes').value=''; $('inComment').value=''; updateReste();
      refresh();
    });

    $('fBoutique').addEventListener('change', refresh);
    $('fPeriod').addEventListener('change', refresh);
    window.addEventListener('resize', drawChart);

    // Rappels (notifications)
    $('notifBtn').addEventListener('click', ()=>{
      if(!window.Notification){ alert('Notifications non supportées sur cet appareil.'); return; }
      Notification.requestPermission().then(p=>{ $('notifBtn').textContent = (p==='granted') ? '🔔 Rappels activés' : '🔔 Activer les rappels'; checkAlert(); });
    });
    if(window.Notification && Notification.permission==='granted'){ $('notifBtn').textContent='🔔 Rappels activés'; }

    // Installation PWA
    let deferredPrompt=null;
    window.addEventListener('beforeinstallprompt', (e)=>{ e.preventDefault(); deferredPrompt=e; $('installBtn').style.display=''; });
    $('installBtn').addEventListener('click', async ()=>{ if(!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; $('installBtn').style.display='none'; });
    window.addEventListener('appinstalled', ()=>{ $('installBtn').style.display='none'; });

    // Synchronisation Firebase (si configurée) puis rendu
    (async ()=>{
      if(window.FIREBASE_CONFIG && FIREBASE_CONFIG.databaseURL){ $('syncNote').style.display='none'; await F.sync(); }
      else { $('syncNote').style.display='block'; $('syncNote').textContent='ℹ️ Mode local : les données sont enregistrées sur CET appareil. Configurez Firebase (Live) pour partager entre les gérants et l\'admin.'; }
      refresh();
    })();
    setInterval(checkAlert, 5*60*1000); // re-vérifie l'alerte 22h toutes les 5 min
  </script>
  <script src="../assets/js/staff.js"></script>
  <script src="../assets/js/sw-register.js"></script>
</body>
</html>
