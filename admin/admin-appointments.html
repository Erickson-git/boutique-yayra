<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAYRA Nail Shop — Rendez-vous</title>
  <meta name="theme-color" content="#1c140b">
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-logo"><a href="../index.html"><span class="logo-y">Y</span>AYRA <span class="logo-sub">Nail Shop</span></a></div>
    <ul class="nav-links">
      <li><a href="index.html">Tableau de bord</a></li>
      <li><a href="admin-products.html">Produits</a></li>
      <li><a href="admin-orders.html">Commandes</a></li>
      <li><a href="admin-kits.html">Kits</a></li>
      <li><a href="admin-appointments.html" class="active">Rendez-vous</a></li>
      <li><a href="admin-staff.html">Employés</a></li>
    </ul>
    <div class="nav-actions">
      <button class="btn-outline" type="button" id="logoutBtn">Se déconnecter</button>
    </div>
    <button class="menu-toggle" id="menuToggle" aria-label="Menu"><svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
  </nav>

  <header class="page-hero">
    <div class="ph-media" style="background-image:url('../assets/images/net-nailart-amber.jpg')"></div>
    <div class="container">
      <p class="section-eyebrow">Administration</p>
      <h1>Rendez-vous</h1>
      <p>Les réservations de services prises par vos clientes.</p>
    </div>
  </header>

  <section class="page">
    <div class="container" style="max-width:1000px;">
      <div id="msg" class="muted" aria-live="polite" style="margin-bottom:16px;"></div>
      <div class="product-card" style="grid-column:span 12;">
        <div class="product-info"><div id="apptWrap"></div></div>
      </div>
    </div>
  </section>

  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    if(!localStorage.getItem('yayra_token')) window.location.href = '../client/login.html';
    document.getElementById('logoutBtn').addEventListener('click', ()=>{ localStorage.removeItem('yayra_token'); window.location.href = '../client/login.html'; });
    const token = () => localStorage.getItem('yayra_token') || '';
    const wrap = document.getElementById('apptWrap');
    const msg = document.getElementById('msg');

    async function load(){
      msg.textContent = 'Chargement...';
      try{
        const res = await fetch('../api/appointments.php?action=list', { method:'GET', headers:{ 'Authorization':'Bearer ' + token() } });
        const data = await res.json();
        if(!data.ok){ wrap.innerHTML = '<p class="muted">Mode démonstration — connectez le backend pour voir les rendez-vous réels.</p>'; msg.textContent=''; return; }
        const items = data.appointments || [];
        if(items.length === 0){ wrap.innerHTML = '<p class="muted">Aucun rendez-vous pour le moment.</p>'; msg.textContent=''; return; }
        let html = '<div class="table-wrap"><table class="table"><thead><tr><th>N°</th><th>Cliente</th><th>Service</th><th>Date</th><th>Statut</th></tr></thead><tbody>';
        for(const a of items){ html += '<tr><td>#'+a.id+'</td><td>'+(a.full_name||'')+'<br/><span class="muted">'+(a.phone||'')+'</span></td><td>'+a.service+'</td><td>'+a.appointment_time+'</td><td>'+a.status+'</td></tr>'; }
        html += '</tbody></table></div>';
        wrap.innerHTML = html; msg.textContent='';
      }catch(e){ wrap.innerHTML = '<p class="muted">Mode démonstration — connectez le backend pour voir les rendez-vous réels.</p>'; msg.textContent=''; }
    }
    document.addEventListener('DOMContentLoaded', load);
  </script>
  <script src="../assets/js/livebadge.js"></script>
</body>
</html>
